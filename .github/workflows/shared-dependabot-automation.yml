name: "Shared Dependabot Automation"

on:
  workflow_call:

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-metadata:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      alert-state: ${{ steps.metadata.outputs.alert-state }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      directory: ${{ steps.metadata.outputs.directory }}
      has-metadata: ${{ steps.check.outputs.has-metadata }}
      is-grouped: ${{ steps.fallback.outputs.is-grouped }}
      extracted-dependency-names: ${{ steps.fallback.outputs.dependency-names }}
      extracted-update-type: ${{ steps.fallback.outputs.update-type }}
      has-security-fix: ${{ steps.fallback.outputs.has-security-fix }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        continue-on-error: true

      - name: Check if metadata was fetched
        id: check
        run: |
          if [ -n "${{ steps.metadata.outputs.update-type }}" ]; then
            echo "has-metadata=true" >> $GITHUB_OUTPUT
          else
            echo "has-metadata=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract PR information (fallback)
        id: fallback
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          HAS_METADATA: ${{ steps.check.outputs.has-metadata }}
        run: |
          echo "is-grouped=false" >> $GITHUB_OUTPUT
          echo "dependency-names=Múltiplas dependências" >> $GITHUB_OUTPUT
          echo "update-type=version-update:semver-patch" >> $GITHUB_OUTPUT
          echo "has-security-fix=false" >> $GITHUB_OUTPUT

          if [ "$HAS_METADATA" == "false" ]; then
            echo "📋 Extracting PR information as fallback (metadata not available)..."

            PR_TITLE=$(gh pr view $PR_NUMBER --json title -q .title)
            PR_BODY=$(gh pr view $PR_NUMBER --json body -q .body)
            PR_LABELS=$(gh pr view $PR_NUMBER --json labels -q '[.labels[].name] | join(",")')

            echo "PR Title: $PR_TITLE"
            echo "PR Labels: $PR_LABELS"

            if echo "$PR_TITLE" | grep -qiE "(bump the dependencies group|dependencies group|grouped)"; then
              echo "is-grouped=true" >> $GITHUB_OUTPUT
              echo "✅ Detected grouped PR"
            fi

            if echo "$PR_LABELS" | grep -qiE "(security|dependabot.*security|CVE)"; then
              echo "has-security-fix=true" >> $GITHUB_OUTPUT
              echo "🔒 Detected security fix"
            fi

            DEPENDENCIES=$(echo "$PR_BODY" | grep -oE "([a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+|[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+)" | head -10 | tr '\n' ',' | sed 's/,$//')
            if [ -z "$DEPENDENCIES" ]; then
              DEPENDENCIES=$(echo "$PR_TITLE" | grep -oE "([a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+|[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+)" | head -5 | tr '\n' ',' | sed 's/,$//')
            fi
            if [ -n "$DEPENDENCIES" ]; then
              echo "dependency-names=$DEPENDENCIES" >> $GITHUB_OUTPUT
            fi

            if echo "$PR_TITLE $PR_BODY" | grep -qiE "(major|breaking|semver-major)"; then
              echo "update-type=version-update:semver-major" >> $GITHUB_OUTPUT
              echo "⚠️ Detected major update"
            elif echo "$PR_TITLE $PR_BODY" | grep -qiE "(minor|semver-minor)"; then
              echo "update-type=version-update:semver-minor" >> $GITHUB_OUTPUT
              echo "📦 Detected minor update"
            fi

            echo "✅ Fallback extraction completed"
          else
            echo "✅ Metadata available, skipping fallback extraction"
          fi

  categorize-and-notify:
    needs: dependabot-metadata
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Add Labels
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
          HAS_METADATA: ${{ needs.dependabot-metadata.outputs.has-metadata }}
        run: |
          echo "🏷️ Adding labels to PR..."

          if [ "$HAS_METADATA" == "true" ]; then
            echo "✅ Using metadata for labels"
            if [ "${{ needs.dependabot-metadata.outputs.alert-state }}" == "fixed" ]; then
              gh pr edit "$PR_URL" --add-label "🚨 security-fix,🚨 high-priority"
              echo "🔒 Added security-fix label"
            elif [ "${{ needs.dependabot-metadata.outputs.update-type }}" == "version-update:semver-major" ]; then
              gh pr edit "$PR_URL" --add-label "⚠️ major-update,⚠️ breaking-change"
              echo "⚠️ Added major-update label"
            else
              gh pr edit "$PR_URL" --add-label "📦 maintenance"
              echo "📦 Added maintenance label"
            fi
          else
            echo "📋 Using fallback information for labels"
            if [ "${{ needs.dependabot-metadata.outputs.has-security-fix }}" == "true" ]; then
              gh pr edit "$PR_URL" --add-label "🚨 security-fix,🚨 high-priority"
              echo "🔒 Added security-fix label (from fallback)"
            elif [ "${{ needs.dependabot-metadata.outputs.extracted-update-type }}" == "version-update:semver-major" ]; then
              gh pr edit "$PR_URL" --add-label "⚠️ major-update,⚠️ breaking-change"
              echo "⚠️ Added major-update label (from fallback)"
            else
              gh pr edit "$PR_URL" --add-label "📦 maintenance"
              echo "📦 Added maintenance label (from fallback)"
            fi
          fi

      - name: Notify Google Chat
        env:
          HAS_METADATA: ${{ needs.dependabot-metadata.outputs.has-metadata }}
        run: |
          if [ "$HAS_METADATA" == "true" ]; then
            echo "✅ Using metadata for notification"
            if [ "${{ needs.dependabot-metadata.outputs.alert-state }}" == "fixed" ]; then
              PRIORITY="🚨 CRÍTICO (Segurança Bancária)"
            else
              PRIORITY="📦 Atualização de Rotina"
            fi

            DEPENDENCIES="${{ needs.dependabot-metadata.outputs.dependency-names }}"
            DIRECTORY="${{ needs.dependabot-metadata.outputs.directory }}"
          else
            echo "📋 Using fallback information for notification"
            if [ "${{ needs.dependabot-metadata.outputs.has-security-fix }}" == "true" ]; then
              PRIORITY="🚨 CRÍTICO (Segurança Bancária)"
            else
              PRIORITY="📦 Atualização de Rotina"
            fi

            DEPENDENCIES="${{ needs.dependabot-metadata.outputs.extracted-dependency-names }}"
            if [ "${{ needs.dependabot-metadata.outputs.is-grouped }}" == "true" ]; then
              DIRECTORY="Múltiplos diretórios (PR agrupado)"
            else
              DIRECTORY="N/A"
            fi
          fi

          MESSAGE="*Dependabot (GWS):* $PRIORITY\n*Dependência:* $DEPENDENCIES\n*Alvo:* Branch develop\n*Diretório:* $DIRECTORY"

          curl -X POST -H 'Content-Type: application/json' '${{ secrets.LINCE_DEPLOY_GOOGLE_CHAT_WEBHOOK }}' -d "
          {
            \"cardsV2\": [{
              \"cardId\": \"dependabotCard\",
              \"card\": {
                \"header\": {
                  \"title\": \"GWS - Missão Crítica\",
                  \"subtitle\": \"Gestão de Vulnerabilidades\"
                },
                \"sections\": [{
                  \"widgets\": [
                    { \"textParagraph\": { \"text\": \"$MESSAGE\" } },
                    {
                      \"buttonList\": {
                        \"buttons\": [{
                          \"text\": \"Revisar na Develop\",
                          \"onClick\": { \"openLink\": { \"url\": \"${{ github.event.pull_request.html_url }}\" } }
                        }]
                      }
                    }
                  ]
                }]
              }
            }]
          }"

  auto-merge:
    needs: dependabot-metadata
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for safe updates
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
          HAS_METADATA: ${{ needs.dependabot-metadata.outputs.has-metadata }}
        run: |
          echo "🔄 Checking if auto-merge should be enabled..."

          if [ "$HAS_METADATA" == "true" ]; then
            echo "✅ Using metadata for auto-merge decision"
            UPDATE_TYPE="${{ needs.dependabot-metadata.outputs.update-type }}"
            ALERT_STATE="${{ needs.dependabot-metadata.outputs.alert-state }}"

            if [ "$UPDATE_TYPE" == "version-update:semver-patch" ] || [ "$ALERT_STATE" == "fixed" ]; then
              echo "✅ Safe to auto-merge: patch update or security fix"
              gh pr merge --auto --squash "$PR_URL"
            else
              echo "⏸️ Skipping auto-merge: not a patch update or security fix"
              exit 0
            fi
          else
            echo "📋 Using fallback information for auto-merge decision"
            echo "⚠️ No metadata available - being conservative"

            HAS_SECURITY="${{ needs.dependabot-metadata.outputs.has-security-fix }}"
            UPDATE_TYPE="${{ needs.dependabot-metadata.outputs.extracted-update-type }}"

            if [ "$HAS_SECURITY" == "true" ] && [ "$UPDATE_TYPE" != "version-update:semver-major" ]; then
              echo "✅ Safe to auto-merge: security fix (not major)"
              gh pr merge --auto --squash "$PR_URL"
            else
              echo "⏸️ Skipping auto-merge: requires manual review (no metadata or potential major update)"
              exit 0
            fi
          fi
