name: Google Chat PR Notification
run-name: Notifying PR '${{ github.event.pull_request.title }}' on Google Chat

on:
  workflow_call:

jobs:
  notify-gchat:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Workflow Version
        run: echo "Executando versão atualizada do workflow em 2026-03-26 15:00"

      - name: Extract Jira ticket from branch name
        id: extract
        run: |
          echo "::group::Extracting Jira Ticket"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Checking branch: $BRANCH"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)
          if [ -n "$TICKET" ]; then
            echo "✅ Ticket found: $TICKET"
          else
            echo "⚠️ No Jira ticket pattern found in branch name."
          fi
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Fetch Jira Data
        if: steps.extract.outputs.ticket != ''
        id: jira
        env:
          JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: "https://weareglobals.atlassian.net"
        run: |
          echo "::group::Fetching Jira Summary"
          TICKET="${{ steps.extract.outputs.ticket }}"
          echo "Requesting summary for $TICKET..."
          
          RESPONSE=$(curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TICKET?fields=summary")
          
          JIRA_SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // empty')
          
          if [ -n "$JIRA_SUMMARY" ]; then
            echo "✅ Summary: $JIRA_SUMMARY"
          else
            echo "❌ Could not fetch summary from Jira API."
          fi
          echo "summary=$JIRA_SUMMARY" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Ultra-Resilient User Mapping
        id: mapper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_MAP: ${{ secrets.GOOGLE_CHAT_USERS_MAPPER }}
        run: |
          echo "::group::Mapping GitHub User to Google Chat ID"
          echo "$USER_MAP"
          GH_LOGIN="${{ github.event.pull_request.user.login }}"
          GH_NAME="${{ github.event.pull_request.user.name }}"
          echo "Fetching commit email for $GH_LOGIN..."
          GH_EMAIL=$(curl -s -H "Authorization: token $GH_TOKEN" ${{ github.event.pull_request.commits_url }} | jq -r '.[0].commit.author.email // empty')

          echo "Raw Data from GitHub:"
          echo "  - Login: $GH_LOGIN"
          echo "  - Name:  $GH_NAME"
          echo "  - Email: $GH_EMAIL"

          clean_val() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[-_.]/ /g' | xargs
          }

          C_LOGIN=$(clean_val "$GH_LOGIN")
          C_NAME=$(clean_val "${GH_NAME:-$GH_LOGIN}")
          C_EMAIL=$(echo "$GH_EMAIL" | tr '[:upper:]' '[:lower:]')
          T_FIRST=$(echo "$C_NAME" | awk '{print $1}')
          T_LAST=$(echo "$C_NAME" | awk '{print $NF}')

          echo "Normalized Data:"
          echo "  - Clean Login: $C_LOGIN"
          echo "  - Clean Name:  $C_NAME"
          echo "  - Tokens:      [$T_FIRST] [$T_LAST]"

          GCHAT_ID=""

          echo "Searching in Mapper JSON..."
          
          GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select(.email | ascii_downcase == \"$C_EMAIL\") | .id" | head -1 | grep -v "null" || echo "")
          [ -z "$GCHAT_ID" ] || echo "✅ Match found via Tier 1 (Email)"

          if [ -z "$GCHAT_ID" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | gsub(\"[-_.]\"; \" \") | gsub(\"\\\\s+\"; \" \")) == \"$C_NAME\") | .id" | head -1 | grep -v "null" || echo "")
            [ -z "$GCHAT_ID" ] || echo "✅ Match found via Tier 2 (Profile Name)"
          fi

          if [ -z "$GCHAT_ID" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | gsub(\"[-_.]\"; \" \") | gsub(\"\\\\s+\"; \" \")) == \"$C_LOGIN\") | .id" | head -1 | grep -v "null" || echo "")
            [ -z "$GCHAT_ID" ] || echo "✅ Match found via Tier 3 (Username)"
          fi

          if [ -z "$GCHAT_ID" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | contains(\"$T_FIRST\")) and (.name | ascii_downcase | contains(\"$T_LAST\"))) | .id" | head -1 | grep -v "null" || echo "")
            [ -z "$GCHAT_ID" ] || echo "✅ Match found via Tier 4 (Fuzzy tokens)"
          fi

          if [ -z "$GCHAT_ID" ]; then
            echo "❌ No match found in any tier. Fallback to @$GH_LOGIN will be used."
          fi

          echo "gchat_id=$GCHAT_ID" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Post to Google Chat
        env:
          WEBHOOK: ${{ secrets.CODE_REVIEW_GOOGLE_CHAT_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          TICKET: ${{ steps.extract.outputs.ticket }}
          JIRA_SUMMARY: ${{ steps.jira.outputs.summary }}
          REVIEWER_ID: ${{ secrets.GOOGLE_CHAT_USER_ID_TO_CODE_REVIEW }}
          AUTHOR_GCHAT_ID: ${{ steps.mapper.outputs.gchat_id }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          echo "::group::Sending Webhook to Google Chat"
          ESCAPED_PR_TITLE=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          if [ -n "$TICKET" ] && [ -n "$JIRA_SUMMARY" ]; then
            ESCAPED_SUMMARY=$(echo "$JIRA_SUMMARY" | sed 's/"/\\"/g')
            HEADER="$ESCAPED_SUMMARY\n$ESCAPED_PR_TITLE"
          else
            HEADER="$ESCAPED_PR_TITLE"
          fi

          if [ -n "$AUTHOR_GCHAT_ID" ]; then
            AUTHOR_LINE="*Autor:* <users/$AUTHOR_GCHAT_ID>"
          else
            AUTHOR_LINE="*Autor:* @$PR_AUTHOR_LOGIN"
          fi

          MESSAGE_TEXT="$HEADER\n\n$AUTHOR_LINE\n\n<users/${REVIEWER_ID}>\n\n*PR:* $PR_URL"

          echo "Final Message Payload:"
          echo -e "$MESSAGE_TEXT"

          RESPONSE=$(curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"$MESSAGE_TEXT\"}")
          
          echo "Google API Response: $RESPONSE"
          echo "::endgroup::"
