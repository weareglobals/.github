name: Google Chat PR Notification
run-name: Notifying PR '${{ github.event.pull_request.title }}' on Google Chat

on:
  workflow_call:

jobs:
  notify-gchat:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira ticket from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Fetch Jira Data
        if: steps.extract.outputs.ticket != ''
        id: jira
        env:
          JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: "https://weareglobals.atlassian.net"
        run: |
          TICKET="${{ steps.extract.outputs.ticket }}"
          RESPONSE=$(curl -s -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H "Accept: application/json" "$JIRA_BASE_URL/rest/api/3/issue/$TICKET?fields=summary")
          JIRA_SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // empty')
          echo "summary=$JIRA_SUMMARY" >> $GITHUB_OUTPUT

      - name: Advanced User Mapping (Token-based Fallbacks)
        id: mapper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_MAP: ${{ vars.GOOGLE_CHAT_USERS_MAPPER }}
        run: |
          LOGIN="${{ github.event.pull_request.user.login }}"
          NAME="${{ github.event.pull_request.user.name }}"
          EMAIL=$(curl -s -H "Authorization: token $GH_TOKEN" ${{ github.event.pull_request.commits_url }} | jq -r '.[0].commit.author.email // empty')

          normalize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[-_.]/ /g' | xargs
          }

          CLEAN_LOGIN=$(normalize "$LOGIN")
          CLEAN_NAME=$(normalize "${NAME:-$LOGIN}")
          CLEAN_EMAIL=$(echo "$EMAIL" | tr '[:upper:]' '[:lower:]')
          
          FIRST_NAME=$(echo "$CLEAN_NAME" | awk '{print $1}')
          LAST_NAME=$(echo "$CLEAN_NAME" | awk '{print $NF}')

          echo "Buscando match para: Login($CLEAN_LOGIN), Nome($CLEAN_NAME), Email($CLEAN_EMAIL)"

          GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select(.email | ascii_downcase == \"$CLEAN_EMAIL\") | .id" | head -1)

          if [ -z "$GCHAT_ID" ] || [ "$GCHAT_ID" == "null" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | gsub(\"[-_.]\"; \" \") | gsub(\"\\\\s+\"; \" \") | trim) == \"$CLEAN_NAME\") | .id" | head -1)
          fi

          if [ -z "$GCHAT_ID" ] || [ "$GCHAT_ID" == "null" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | gsub(\"[-_.]\"; \" \") | gsub(\"\\\\s+\"; \" \") | trim) == \"$CLEAN_LOGIN\") | .id" | head -1)
          fi

          if [ -z "$GCHAT_ID" ] || [ "$GCHAT_ID" == "null" ]; then
            GCHAT_ID=$(echo "$USER_MAP" | jq -r ".[] | select((.name | ascii_downcase | contains(\"$FIRST_NAME\")) and (.name | ascii_downcase | contains(\"$LAST_NAME\"))) | .id" | head -1)
          fi

          FINAL_ID=$(echo "$GCHAT_ID" | grep -v "null" || echo "")
          echo "gchat_id=$FINAL_ID" >> $GITHUB_OUTPUT
          echo "Match Final: ${FINAL_ID:-Nenhum ID encontrado}"

      - name: Post to Google Chat
        env:
          WEBHOOK: ${{ secrets.CODE_REVIEW_GOOGLE_CHAT_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          TICKET: ${{ steps.extract.outputs.ticket }}
          JIRA_SUMMARY: ${{ steps.jira.outputs.summary }}
          REVIEWER_ID: ${{ secrets.GOOGLE_CHAT_USER_ID_TO_CODE_REVIEW }}
          AUTHOR_GCHAT_ID: ${{ steps.mapper.outputs.gchat_id }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          ESCAPED_PR_TITLE=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          if [ -n "$TICKET" ] && [ -n "$JIRA_SUMMARY" ]; then
            ESCAPED_SUMMARY=$(echo "$JIRA_SUMMARY" | sed 's/"/\\"/g')
            HEADER="$ESCAPED_SUMMARY\n$ESCAPED_PR_TITLE"
          else
            HEADER="$ESCAPED_PR_TITLE"
          fi

          if [ -n "$AUTHOR_GCHAT_ID" ]; then
            AUTHOR_LINE="*Autor:* <users/$AUTHOR_GCHAT_ID>"
          else
            AUTHOR_LINE="*Autor:* @$PR_AUTHOR_LOGIN"
          fi

          MESSAGE_TEXT="$HEADER\n\n$AUTHOR_LINE\n\n<users/${REVIEWER_ID}>\n\n*PR:* $PR_URL"

          curl -X POST "$WEBHOOK" -H 'Content-Type: application/json' -d "{\"text\": \"$MESSAGE_TEXT\"}"
